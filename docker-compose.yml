services:
  postgres:
    container_name: postgres
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: betting_bot
    ports:
      - "5432:5432"
    expose:
      - 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    network_mode: "host"


  migrate:
    build: .
    env_file:
      - .env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    network_mode: "host"

  bot: 
    build: .
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: always
    network_mode: "host"

volumes:
  postgres_data:
