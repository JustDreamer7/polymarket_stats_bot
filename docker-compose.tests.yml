services:
  postgres:
    container_name: postgres-tests
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: betting_bot_test
    ports:
      - "5432:5432"
    expose:
      - 5432
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d betting_bot_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    network_mode: "host"

volumes:
  postgres_test_data:
